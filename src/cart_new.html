<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <title>Shopping Cart</title>
</head>
<body>

 <nav id="header" class="w-full z-30 top-0 py-1">
        <div class="w-full container mx-auto flex flex-wrap items-center justify-between mt-0 px-6 py-3 ">

            <label for="menu-toggle" class="cursor-pointer md:hidden block">
                <svg class="fill-current text-gray-900" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
                    <title>menu</title>
                    <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z"></path>
                </svg>
            </label>
            <input class="hidden" type="checkbox" id="menu-toggle" />

            <div class="hidden md:flex md:items-center md:w-auto w-full order-3 md:order-1" id="menu">
                <nav>
                    <ul class="md:flex items-center justify-between text-base text-gray-700 pt-4 md:pt-0">
                        <li><a class="inline-block no-underline hover:text-black hover:underline py-2 px-4" href="#">Shop</a></li>
                        <li><a class="inline-block no-underline hover:text-black hover:underline py-2 px-4" href="#">About</a></li>
                    </ul>
                </nav>
            </div>

            <div class="order-1 md:order-2">
                <a class="flex items-center tracking-wide no-underline hover:no-underline font-bold text-gray-800 text-xl " href="/index.html">
                    <img class="fill-current text-gray-800 mr-2" src="/Assets/img/logo_2.png" width="60" height="60" viewBox="0 0 24 24">
                        <path d="M5,22h14c1.103,0,2-0.897,2-2V9c0-0.553-0.447-1-1-1h-3V7c0-2.757-2.243-5-5-5S7,4.243,7,7v1H4C3.447,8,3,8.447,3,9v11 C3,21.103,3.897,22,5,22z M9,7c0-1.654,1.346-3,3-3s3,1.346,3,3v1H9V7z M5,10h2v2h2v-2h6v2h2v-2h2l0.002,10H5V10z" />
                    </img>
                    
                </a>
            </div>

            <div class="order-2 md:order-3 flex items-center" id="nav-content">

                <button type="button" onclick="toggleProfilePanel()" class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-white text-gray-900 hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <svg class="fill-current" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                    <circle fill="none" cx="12" cy="7" r="3" />
                    <path d="M12 2C9.243 2 7 4.243 7 7s2.243 5 5 5 5-2.243 5-5S14.757 2 12 2zM12 10c-1.654 0-3-1.346-3-3s1.346-3 3-3 3 1.346 3 3S13.654 10 12 10zM21 21v-1c0-3.859-3.141-7-7-7h-4c-3.86 0-7 3.141-7 7v1h2v-1c0-2.757 2.243-5 5-5h4c2.757 0 5 2.243 5 5v1H21z" />
                  </svg>
                </button>

                <a class="pl-3 inline-block no-underline hover:text-black" href="/src/cart_new.html">
                    <svg class="fill-current hover:text-black" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                        <path d="M21,7H7.462L5.91,3.586C5.748,3.229,5.392,3,5,3H2v2h2.356L9.09,15.414C9.252,15.771,9.608,16,10,16h8 c0.4,0,0.762-0.238,0.919-0.606l3-7c0.133-0.309,0.101-0.663-0.084-0.944C21.649,7.169,21.336,7,21,7z M17.341,14h-6.697L8.371,9 h11.112L17.341,14z" />
                        <circle cx="10.5" cy="18.5" r="1.5" />
                        <circle cx="17.5" cy="18.5" r="1.5" />
                    </svg>
                </a>

            </div>
        </div>
    </nav>

      <div id="profile-panel" class="fixed top-0 right-0 h-full w-80 max-w-xs bg-white shadow-xl transform translate-x-full transition-transform duration-300 z-50">
        <div class="flex items-center justify-between border-b px-6 py-4">
          <div>
            <h2 class="text-lg font-semibold text-gray-900">Profile</h2>
            <p id="profile-greeting" class="text-sm text-gray-600">Welcome, guest</p>
          </div>
          <button type="button" onclick="toggleProfilePanel(false)" class="text-gray-600 hover:text-gray-900 text-2xl leading-none">&times;</button>
        </div>
        <div class="p-6">
          <div id="profile-actions" class="space-y-4">
            <a id="profile-login-link" href="login.html" class="block w-full text-center bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700">Login</a>
            <div id="profile-logged-in" class="hidden space-y-4">
              <p class="text-gray-900 text-base">Signed in as</p>
              <p id="profile-username" class="text-xl font-semibold text-gray-900"></p>
              <button type="button" onclick="logout()" class="w-full bg-red-600 text-white py-3 rounded-md hover:bg-red-700">Logout</button>
            </div>
          </div>
        </div>
      </div>
      <div id="profile-backdrop" class="fixed inset-0 bg-black bg-opacity-30 hidden z-40" onclick="toggleProfilePanel(false)"></div>




    <section class="bg-white py-8 antialiased white md:py-16">
      <div class="mx-auto max-w-screen-xl px-4 2xl:px-0">
        <h2 class="text-xl font-semibold text-gray-900 dark:text-black sm:text-2xl">Cart</h2>

        <div class="mt-6 sm:mt-8 md:gap-6 xl:gap-8">
          <div class="mx-auto w-full max-w-4xl">
            <div class="space-y-6" id="cart-items">
              <p class="text-center text-gray-500">Your cart is empty</p>
            </div>
          </div>
          <br>
          <br>
          <br>
          <br>
          <br>
          <!-- Order summary -->
          <div class="mx-auto w-full max-w-4xl">
            <div class="space-y-4 rounded-lg border border-gray-200 bg-white p-4 shadow-sm dark:border-gray-700 dark:bg-gray-800 sm:p-6">
              <p class="text-xl font-semibold text-gray-900 dark:text-white">Order summary</p>

              <div class="flex items-center gap-4">
                  <dl class="flex items-center justify-between gap-4">
                    <dt class="text-base font-normal text-gray-500 dark:text-gray-400"> total</dt>
                    <dd class="text-base font-medium text-gray-900 dark:text-white" id="subtotal">IDR 0</dd>
                  </dl>
              <button type="button" onclick="checkout()" class="bg-green-500 hover:bg-green-800 text-white font-bold py-2 px-4 rounded">Proceed to Checkout</button>

              <div class="flex items-center justify-center gap-2">
                <span class="text-sm font-normal text-gray-500 dark:text-gray-400 "> or </span>
                <a href="../index.html" title="" class="text-white inline-flex items-center gap-2 text-sm font-medium text-primary-700 underline hover:no-underline dark:text-primary-500">
                  Continue Shopping
                  <svg class="h-5 w-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 12H5m14 0-4 4m4-4-4-4" />
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="../script/cartUtils.js"></script>
    <script src="../script/cart.js"></script>
    <script src="../path/to/flowbite/dist/flowbite.min.js"></script>
    <script src="../script/login_und_profile.js"></script>
</body>
</html>
